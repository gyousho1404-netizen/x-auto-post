name: X Auto Post

on:
  schedule:
    - cron: "0 23 * * *"
    - cron: "0 3 * * *"
    - cron: "0 10 * * *"
  workflow_dispatch:

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - run: pip install tweepy anthropic python-dotenv
      - name: Debug env vars
        run: python -c "import os; print('API_KEY:', os.environ.get('X_API_KEY','NONE')[:8]); print('ACCESS:', os.environ.get('X_ACCESS_TOKEN','NONE')[:15])"
        env:
          X_API_KEY: ${{ secrets.X_API_KEY }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
      - run: python x_auto_post.py
        env:
          X_API_KEY: ${{ secrets.X_API_KEY }}
          X_API_SECRET: ${{ secrets.X_API_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_TOKEN_SECRET: ${{ secrets.X_ACCESS_TOKEN_SECRET }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
